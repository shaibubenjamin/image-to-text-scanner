name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x android-app/gradlew
        continue-on-error: true

      - name: Create gradlew if missing
        working-directory: android-app
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.4
          fi

      - name: Inject server URL
        working-directory: android-app
        run: |
          BASE_URL="${{ secrets.BASE_URL }}"
          if [ -z "$BASE_URL" ]; then
            BASE_URL="https://qex-questionnaire-intelligence.onrender.com"
          fi
          sed -i "s|https://qex-questionnaire-intelligence.onrender.com|$BASE_URL|g" app/build.gradle
          echo "Using BASE_URL: $BASE_URL"

      - name: Build Debug APK
        working-directory: android-app
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QEX-Scanner-APK
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
