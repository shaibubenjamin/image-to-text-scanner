name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Accept Android SDK licences & install components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Create local.properties (SDK path for Gradle)
        run: echo "sdk.dir=$ANDROID_HOME" > android-app/local.properties

      - name: Inject server URL
        run: |
          BASE_URL="${{ secrets.BASE_URL }}"
          if [ -z "$BASE_URL" ]; then
            BASE_URL="https://qex-questionnaire-intelligence.onrender.com"
          fi
          sed -i "s|https://qex-questionnaire-intelligence.onrender.com|$BASE_URL|g" \
            android-app/app/build.gradle
          echo "BASE_URL set to: $BASE_URL"

      - name: Build Debug APK
        working-directory: android-app
        run: gradle assembleDebug --stacktrace --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QEX-Scanner-APK
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
