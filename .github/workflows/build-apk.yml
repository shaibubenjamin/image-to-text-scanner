name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Inject server URL
        run: |
          BASE_URL="${{ secrets.BASE_URL }}"
          if [ -z "$BASE_URL" ]; then
            BASE_URL="https://qex-questionnaire-intelligence.onrender.com"
          fi
          sed -i "s|https://qex-questionnaire-intelligence.onrender.com|$BASE_URL|g" android-app/app/build.gradle
          echo "Building with BASE_URL: $BASE_URL"

      - name: Build Debug APK with Gradle
        working-directory: android-app
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: QEX-Scanner-APK
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
